{{ define "title" }}{{ .Site.Title }}{{ end }}

{{ define "main" }}
{{ .Content }}
<hr>
<ul>
  {{- range (.Site.GetPage "posts").Pages }}
  <li>
    {{- if .Params.link }}
    <a href="{{ .Params.link }}" target="_blank" rel="noopener noreferrer">{{ .Title }} ↪</a>
    {{- else }}
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    {{- end }}
  </li>
  {{- end }}
</ul>
{{ end }}
